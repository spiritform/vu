<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VU</title>
  <link rel="stylesheet" href="style.css?v=23" />
</head>
<body>
  <header class="topbar">
    <div class="folder-row">
      <input id="folder" type="text" placeholder="paste folder path…" spellcheck="false" />
      <label class="chip">
        <input id="recursive" type="checkbox" />
        <span>+ sub-folders</span>
      </label>
      <label class="chip">
        <input id="autoScan" type="checkbox" />
        <span>auto-scan</span>
      </label>
      <button id="scanBtn" class="btn primary">scan</button>
    </div>
    <div class="meta">
      <span id="countLabel" class="muted">—</span>
      <button id="filterBtn" class="btn ghost" title="filter hearts (F)">
        <span class="heart-icon">♥</span>
        <span id="heartCount">0</span>
      </button>
      <span id="selChip" class="sel-chip hidden">
        <span id="selCount">0</span>
        <button id="clearSelBtn" class="sel-x" title="clear selection (Esc)">✕</button>
      </span>
      <button id="compareBtn" class="btn hidden" title="compare (C)">compare</button>
      <button id="exportBtn" class="btn accent" title="export">export</button>
      <button id="settingsBtn" class="btn ghost icon-only" title="settings" aria-label="settings">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <main id="grid" class="grid"></main>

  <div id="empty" class="empty hidden">
    <div class="empty-inner">
      <div class="empty-icon">◇</div>
      <div class="empty-text">paste a folder path above and hit scan</div>
    </div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox hidden" tabindex="-1">
    <div class="lb-topbar">
      <div class="lb-info">
        <span id="lbName"></span>
        <span id="lbIndex" class="muted"></span>
      </div>
      <div class="lb-actions">
        <button id="lbHeart" class="icon-btn" title="heart (H)">♥</button>
        <button id="lbDelete" class="icon-btn danger" title="delete (Del)" aria-label="delete">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 7h16"/>
            <path d="M10 11v6"/>
            <path d="M14 11v6"/>
            <path d="M6 7l1 12a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-12"/>
            <path d="M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/>
          </svg>
        </button>
        <button id="lbClose" class="icon-btn" title="close (Esc)" aria-label="close">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M6 6l12 12"/>
            <path d="M18 6l-12 12"/>
          </svg>
        </button>
      </div>
    </div>
    <button id="lbPrev" class="lb-nav lb-prev" title="prev (←)">‹</button>
    <button id="lbNext" class="lb-nav lb-next" title="next (→)">›</button>
    <div id="lbStage" class="lb-stage"></div>
    <div id="lbSpinner" class="lb-spinner hidden">
      <div class="lb-spinner-dot"></div>
      <span>preparing video…</span>
    </div>
  </div>

  <!-- Compare view -->
  <div id="compare" class="compare hidden">
    <div class="cmp-topbar">
      <div class="cmp-label muted">compare</div>
      <div class="lb-actions">
        <button id="cmpSwap" class="icon-btn" title="swap (S)" aria-label="swap">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 8h12"/>
            <path d="M16 5l3 3-3 3"/>
            <path d="M17 16H5"/>
            <path d="M8 13l-3 3 3 3"/>
          </svg>
        </button>
        <button id="cmpClose" class="icon-btn" title="close (Esc)" aria-label="close">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M6 6l12 12"/>
            <path d="M18 6l-12 12"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="cmp-stage">
      <div id="cmpPaneA" class="cmp-pane"></div>
      <div class="cmp-divider"></div>
      <div id="cmpPaneB" class="cmp-pane"></div>
    </div>
  </div>

  <!-- Export modal -->
  <div id="exportModal" class="modal hidden">
    <div class="modal-card">
      <h3>export hearts</h3>
      <label>subfolder name
        <input id="exportName" type="text" value="selects" />
      </label>
      <label class="chip">
        <input id="exportMove" type="checkbox" />
        <span>move (don't copy)</span>
      </label>
      <div class="modal-actions">
        <button id="exportCancel" class="btn ghost">cancel</button>
        <button id="exportGo" class="btn accent">export images</button>
        <button id="exportZip" class="btn accent">zip</button>
      </div>
    </div>
  </div>

  <!-- Delete confirm modal -->
  <div id="deleteModal" class="modal hidden">
    <div class="modal-card">
      <h3 id="deleteTitle">Delete this item?</h3>
      <p id="deleteBody" class="modal-text"></p>
      <div class="modal-actions">
        <button id="deleteCancel" class="btn ghost">cancel</button>
        <button id="deleteRemove" class="btn">remove from VU</button>
        <button id="deleteDisk" class="btn danger-btn">delete from disk</button>
      </div>
    </div>
  </div>

  <!-- Settings modal -->
  <div id="settingsModal" class="modal hidden">
    <div class="modal-card">
      <h3>settings</h3>
      <label>global hotkey
        <button id="hotkeyField" type="button" class="hotkey-field">ctrl+shift+v</button>
        <span class="modal-hint">click and press a key combo. needs at least one of ctrl, shift, or alt.</span>
      </label>
      <div class="modal-actions">
        <button id="settingsCancel" class="btn ghost">cancel</button>
        <button id="settingsSave" class="btn accent">save</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js?v=38"></script>
</body>
</html>
